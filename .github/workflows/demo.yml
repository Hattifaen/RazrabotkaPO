name: Demo
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.5'
      - name: Install flake8
        run: pip install flake8
      - name: Lint with flake8
        run: flake8 . --count --max-line-length=80 --statistics
      
